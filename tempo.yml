stream_over_http_enabled: true

server:
  http_listen_port: ${TEMPO_HTTP_LISTEN_PORT}

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: ${TEMPO_OTLP_GRPC_LISTEN_ENDPOINT}
        http:
          endpoint: ${TEMPO_OTLP_HTTP_LISTEN_ENDPOINT}

compactor:
  compaction:
    block_retention: ${TEMPO_RETENTION}

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

usage_report:
  reporting_enabled: false
