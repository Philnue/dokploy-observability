apiVersion: 1

providers:
  - name: Observability
    orgId: 1
    folder: Observability
    folderUid: observability
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
